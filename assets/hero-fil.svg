<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-label="Crépuscule améthyste : une personne écrit sous un arbre, un fil d'or s'élève de son carnet">
  <defs>
    <linearGradient id="ciel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4d75"/>
      <stop offset="0.32" stop-color="#8d7cb0"/>
      <stop offset="0.62" stop-color="#bcaed1"/>
      <stop offset="1" stop-color="#ecdfd0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2e3c4" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#e3c891" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#c9a86a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="colline1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8d7cab"/>
      <stop offset="1" stop-color="#6f5f92"/>
    </linearGradient>
    <linearGradient id="colline2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#655684"/>
      <stop offset="1" stop-color="#544671"/>
    </linearGradient>
    <linearGradient id="colline3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#413855"/>
      <stop offset="1" stop-color="#37323f"/>
    </linearGradient>
    <filter id="brumeux" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.65  0 0 0 0.04 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Ciel -->
  <rect width="640" height="520" fill="url(#ciel)"/>

  <!-- Halo doré (lune basse) -->
  <circle cx="452" cy="196" r="150" fill="url(#halo)"/>
  <circle cx="452" cy="196" r="34" fill="#f4e7cb"/>

  <!-- Oiseaux lointains -->
  <g stroke="#efe6f2" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M172 138 q7 -7 14 0 q7 -7 14 0"/>
    <path d="M215 165 q5.5 -5.5 11 0 q5.5 -5.5 11 0" opacity="0.6"/>
    <path d="M140 178 q4.5 -4.5 9 0 q4.5 -4.5 9 0" opacity="0.45"/>
  </g>

  <!-- Collines brumeuses -->
  <path d="M0 296 Q108 252 216 288 T430 300 T640 276 V520 H0 Z" fill="url(#colline1)" filter="url(#brumeux)" opacity="0.65"/>
  <path d="M0 348 Q140 306 300 344 T640 336 V520 H0 Z" fill="url(#colline2)" opacity="0.85"/>
  <path d="M0 430 Q170 380 360 424 T640 412 V520 H0 Z" fill="url(#colline3)"/>

  <!-- Arbre (silhouette) -->
  <g fill="#2c2733">
    <path d="M158 434 c-2 -34 -4 -66 -3 -96 c-14 -6 -28 -16 -34 -32 c12 6 24 10 33 10 c-1 -14 -8 -24 -20 -34 c14 2 24 8 30 16 c3 -22 10 -40 24 -52 c-4 16 -5 30 -3 42 c8 -12 20 -20 36 -23 c-10 10 -18 21 -22 32 c12 -4 25 -4 38 2 c-14 4 -26 10 -34 18 c-3 26 -6 62 -7 117 Z"/>
    <ellipse cx="171" cy="248" rx="64" ry="44" opacity="0.94"/>
    <ellipse cx="128" cy="278" rx="42" ry="30" opacity="0.9"/>
    <ellipse cx="216" cy="282" rx="46" ry="32" opacity="0.9"/>
  </g>

  <!-- Personne assise qui écrit, adossée à l'arbre -->
  <g fill="#232028">
    <circle cx="243" cy="392" r="13"/>
    <path d="M231 402 q14 -6 25 2 q9 8 8 24 l-4 16 q-16 6 -32 2 l-6 -20 q-2 -16 9 -24 Z"/>
    <path d="M258 424 q14 -2 24 6 l-4 10 q-12 -4 -22 -2 Z"/>
    <path d="M228 444 q22 8 44 0 l6 10 q-28 10 -56 0 Z"/>
  </g>
  <!-- Carnet ouvert, éclairé -->
  <path d="M270 436 q12 -8 26 -3 q12 4 22 -1 l4 12 q-11 6 -24 2 q-13 -4 -24 2 Z" fill="#efe6d2"/>
  <path d="M294 434 l2 12" stroke="#c9b48c" stroke-width="1.4"/>

  <!-- Le fil d'or : s'élève du carnet et traverse le ciel -->
  <g fill="none" stroke="#c9a86a" stroke-linecap="round">
    <path d="M296 430 C310 380 268 348 314 308 C358 270 300 242 356 208 C400 182 420 160 452 148" stroke-width="2.6" opacity="0.95"/>
    <path d="M296 430 C312 386 276 352 318 314" stroke-width="1.1" opacity="0.5" transform="translate(6,4)"/>
  </g>
  <!-- Éclats sur le fil -->
  <g fill="#e9d3a3">
    <circle cx="314" cy="308" r="3"/>
    <circle cx="356" cy="208" r="2.6"/>
    <circle cx="452" cy="148" r="3.4"/>
    <circle cx="268" cy="368" r="2"/>
  </g>

  <!-- Grain léger -->
  <rect width="640" height="520" filter="url(#grain)" opacity="0.25"/>
</svg>
